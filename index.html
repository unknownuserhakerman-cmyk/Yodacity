<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Hyperlink</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #0f0f23;
      color: #eee;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .box {
      background: #1a1a2e;
      border-radius: 14px;
      padding: 24px;
      max-width: 480px;
      width: 100%;
    }
    h2 { margin-bottom: 4px; }
    p.sub { color: #888; font-size: 13px; margin-bottom: 18px; }
    label { font-size: 13px; color: #aaa; display: block; margin-bottom: 4px; }
    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #16213e;
      color: #fff;
      font-size: 15px;
      margin-bottom: 14px;
    }
    .go {
      width: 100%;
      padding: 14px;
      background: #4fc3f7;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
    }
    .go:active { opacity: 0.7; }
    #result { display: none; margin-top: 18px; }
    #result hr { border: none; border-top: 1px solid #333; margin-bottom: 14px; }
    #thelink {
      display: block;
      width: 100%;
      padding: 16px;
      background: #0d2137;
      border: 2px solid #4fc3f7;
      border-radius: 10px;
      color: #4fc3f7;
      font-size: 14px;
      text-decoration: none;
      text-align: center;
      word-break: break-all;
      margin-bottom: 10px;
    }
    #thelink:active { background: #4fc3f7; color: #000; }
    .cp {
      width: 100%;
      padding: 12px;
      background: #2e7d32;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
    }
    .cp:active { opacity: 0.7; }
    #err { color: #f44336; margin-top: 8px; font-size: 13px; }
    #info { color: #666; font-size: 11px; margin-top: 8px; word-break: break-all; }
  </style>
</head>
<body>
<div class="box">
  <h2>🔗 Link Masker</h2>
  <p class="sub">👇 You type a fake link → it shows that but redirects to yours</p>

  <label>🎭 Fake URL (what they see)</label>
  <input id="fake" value="https://www.roblox.com/games/4483381587/" placeholder="https://www.roblox.com/...">

  <label>🎯 Real URL (where it goes)</label>
  <input id="real" value="https://example.com" placeholder="https://your-site.com">

  <button class="go" onclick="doit()">🔗 MAKE HYPERLINK</button>

  <div id="result">
    <hr>
    <p style="font-size:13px;color:#4fc3f7;font-weight:600;margin-bottom:10px">✅ TAP THE BUTTON BELOW:</p>
    <a id="thelink" href="#" target="_blank">🔗 Loading...</a>
    <button class="cp" onclick="copyit(event)">📋 Copy HTML Code</button>
    <div id="err"></div>
    <div id="info"></div>
  </div>
</div>

<script>
function doit() {
  var fake = document.getElementById('fake').value.trim();
  var real = document.getElementById('real').value.trim();
  var el = document.getElementById('thelink');
  var err = document.getElementById('err');
  var info = document.getElementById('info');
  var result = document.getElementById('result');

  err.textContent = '';
  info.textContent = '';
  result.style.display = 'none';

  if (!fake) fake = 'https://www.roblox.com/';
  if (!real) { err.textContent = 'Put a real URL'; result.style.display = 'block'; return; }
  try { new URL(real); } catch(e) { err.textContent = 'Bad URL. Needs https://'; result.style.display = 'block'; return; }

  // Use is.gd JSONP — works on ALL browsers, file://, mobile, everything
  var cb = 'cb' + Math.random().toString(36).slice(2);
  window[cb] = function(d) {
    if (d.errorcode) {
      err.textContent = 'Error: ' + d.errormessage;
    } else {
      el.href = d.shorturl;
      el.textContent = '🔗 ' + fake;
      el.dataset.html = '<a href="' + d.shorturl + '" target="_blank">' + fake + '</a>';
      info.textContent = 'Short URL: ' + d.shorturl;
    }
    result.style.display = 'block';
    delete window[cb];
    document.body.removeChild(document.getElementById('s' + cb));
  };

  var s = document.createElement('script');
  s.id = 's' + cb;
  s.src = 'https://is.gd/create.php?format=json&callback=' + cb + '&url=' + encodeURIComponent(real);
  document.body.appendChild(s);

  // timeout fallback
  setTimeout(function() {
    if (result.style.display === 'none') {
      err.textContent = 'Request timed out. Check your internet.';
      result.style.display = 'block';
    }
  }, 10000);
}

function copyit(e) {
  var html = document.getElementById('thelink').dataset.html;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(html).then(function() {
      e.target.textContent = '✅ Copied!';
      setTimeout(function() { e.target.textContent = '📋 Copy HTML Code'; }, 2000);
    });
  } else {
    var ta = document.createElement('textarea');
    ta.value = html;
    ta.style.cssText = 'position:fixed;left:-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    e.target.textContent = '✅ Copied!';
    setTimeout(function() { e.target.textContent = '📋 Copy HTML Code'; }, 2000);
  }
}
</script>
</body>
</html>
