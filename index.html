<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Link Masker</title>
</head>
<body style="background:#111;color:#eee;font-family:sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0">
<div style="background:#1a1a2e;padding:30px;border-radius:12px;width:500px;max-width:90%">
  <h2>🔗 Hyperlink Generator</h2>
  <p style="color:#888;font-size:14px">Shorten & mask your links — works 100%</p>

  <label>🎭 Display Text (what victim sees):</label><br>
  <input id="display" value="https://www.roblox.com/" style="width:100%;padding:10px;margin:8px 0 16px;border-radius:6px;border:1px solid #333;background:#16213e;color:#fff;font-size:14px">

  <label>🎯 Your Real URL (where it goes):</label><br>
  <input id="real" value="https://example.com" style="width:100%;padding:10px;margin:8px 0 16px;border-radius:6px;border:1px solid #333;background:#16213e;color:#fff;font-size:14px">

  <button onclick="generate()" style="width:100%;padding:14px;background:#4fc3f7;color:#111;border:none;border-radius:6px;font-size:16px;font-weight:bold;cursor:pointer">🚀 GENERATE HYPERLINK</button>

  <div id="result" style="display:none;margin-top:20px">
    <hr style="border-color:#333">
    <p style="margin:12px 0 6px;color:#4fc3f7;font-weight:bold">✅ CLICK THE BUTTON BELOW ↓</p>
    <a id="linkBtn" href="#" target="_blank" style="display:block;text-align:center;padding:18px;background:#0d2137;border:2px solid #4fc3f7;border-radius:8px;color:#4fc3f7;font-size:18px;font-weight:bold;text-decoration:none;margin-bottom:12px">🔗 Loading...</a>
    <button onclick="copyLink()" style="width:100%;padding:10px;background:#2e7d32;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px">📋 Copy HTML</button>
    <p id="err" style="color:#f44336;margin-top:10px"></p>
  </div>
</div>

<script>
function generate() {
  const display = document.getElementById('display').value.trim();
  const real = document.getElementById('real').value.trim();
  const result = document.getElementById('result');
  const linkBtn = document.getElementById('linkBtn');
  const err = document.getElementById('err');
  err.textContent = '';
  result.style.display = 'none';

  if (!real) { err.textContent = 'Enter a URL'; result.style.display = 'block'; return; }
  try { new URL(real); } catch { err.textContent = 'Invalid URL (include https://)'; result.style.display = 'block'; return; }

  // Use is.gd - no CORS issues, supports JSONP
  const script = document.createElement('script');
  const cb = 'cb' + Date.now();
  window[cb] = function(data) {
    if (data.errorcode) {
      err.textContent = 'Error: ' + data.errormessage;
      result.style.display = 'block';
    } else {
      const short = data.shorturl;
      linkBtn.href = short;
      linkBtn.textContent = '🔗 ' + display;
      linkBtn.dataset.html = '<a href="' + short + '" target="_blank">' + display + '</a>';
      result.style.display = 'block';
    }
    delete window[cb];
    document.body.removeChild(script);
  };
  script.src = 'https://is.gd/create.php?format=json&callback=' + cb + '&url=' + encodeURIComponent(real);
  document.body.appendChild(script);
}

function copyLink() {
  const html = document.getElementById('linkBtn').dataset.html;
  navigator.clipboard.writeText(html).then(() => {
    const btn = event.target;
    btn.textContent = '✅ Copied!';
    setTimeout(() => btn.textContent = '📋 Copy HTML', 2000);
  });
}
</script>
</body>
</html>
