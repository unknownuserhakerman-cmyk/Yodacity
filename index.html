<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Masker</title>
<style>
* { box-sizing:border-box;margin:0;padding:0 }
body { font-family:Arial,sans-serif;background:#0f0f23;color:#eee;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px }
.card { background:#1a1a2e;border-radius:14px;padding:24px;max-width:500px;width:100% }
h1 { font-size:20px;margin-bottom:4px }
.sub { color:#888;font-size:13px;margin-bottom:18px }
label { display:block;font-size:13px;color:#aaa;margin-bottom:4px }
input { width:100%;padding:12px;border-radius:8px;border:1px solid #333;background:#16213e;color:#fff;font-size:15px;margin-bottom:14px }
.go { width:100%;padding:14px;background:#4fc3f7;color:#000;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer }
.go:active { opacity:.7 }
#result { display:none;margin-top:18px }
#result hr { border:none;border-top:1px solid #333;margin-bottom:14px }
#preview { display:block;width:100%;padding:16px;background:#0d2137;border:2px solid #4fc3f7;border-radius:10px;color:#4fc3f7;font-size:14px;text-decoration:none;text-align:center;word-break:break-all;margin-bottom:12px }
#preview:active { background:#4fc3f7;color:#000 }
.code { background:#111;border:1px solid #333;border-radius:8px;padding:12px;font-family:monospace;font-size:12px;color:#4fc3f7;word-break:break-all;margin-bottom:10px;min-height:40px }
.btns { display:flex;gap:8px }
.btns button { flex:1;padding:12px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer }
.cp { background:#2e7d32;color:#fff }
.dc { background:#5865F2;color:#fff }
#err { color:#f44336;font-size:13px;margin-top:8px }
#info { color:#666;font-size:11px;margin-top:6px;word-break:break-all }
#manualBox { display:none;margin-top:12px;padding:12px;background:#1a0a0a;border:1px solid #f44336;border-radius:8px }
#manualBox label { color:#ff8;font-size:12px }
#manualBox input { background:#111;border-color:#f44336;color:#fff }
</style>
</head>
<body>
<div class="card">
  <h1>🔗 Link Masker</h1>
  <p class="sub">Uses <b>lnk.ua</b> — shows fake URL, goes to your real one</p>

  <label>🎭 FAKE URL (what victim sees)</label>
  <input id="fake" value="https://www.roblox.com/games/4483381587/">

  <label>🎯 REAL URL (where it goes)</label>
  <input id="real" value="https://example.com">

  <button class="go" onclick="generate()">🔗 GENERATE</button>

  <div id="result">
    <hr>
    <p style="font-size:13px;color:#4fc3f7;font-weight:600;margin-bottom:8px">✅ CLICK THE LINK BELOW:</p>
    <a id="preview" href="#" target="_blank">🔗 Loading...</a>

    <p style="font-size:13px;color:#aaa;margin:12px 0 6px;font-weight:600">📋 Copy this to paste:</p>
    <div class="code" id="output">...</div>

    <div class="btns">
      <button class="cp" onclick="copy('html')">📋 Copy HTML</button>
      <button class="dc" onclick="copy('discord')">💬 Copy Discord</button>
    </div>

    <div id="err"></div>
    <div id="info"></div>

    <div id="manualBox">
      <p style="color:#ff8;font-size:12px;margin-bottom:8px">⚠️ Auto-API blocked. Get short link manually:</p>
      <label>1. Open <a href="https://lnk.ua/en" target="_blank" style="color:#4fc3f7">lnk.ua</a></label>
      <label>2. Paste your real URL there, click Shorten</label>
      <label>3. Copy the shortened URL and paste below:</label>
      <input id="manualShort" placeholder="https://lnk.ua/abc123">
      <button class="go" onclick="manualDone()" style="font-size:14px;margin-top:4px">✅ USE THIS SHORT URL</button>
    </div>
  </div>
</div>

<script>
function generate() {
  var fake = document.getElementById('fake').value.trim();
  var real = document.getElementById('real').value.trim();
  var preview = document.getElementById('preview');
  var output = document.getElementById('output');
  var err = document.getElementById('err');
  var info = document.getElementById('info');
  var manualBox = document.getElementById('manualBox');
  var result = document.getElementById('result');

  err.textContent = '';
  info.textContent = '';
  manualBox.style.display = 'none';
  result.style.display = 'none';

  if (!fake) fake = 'https://www.roblox.com/';
  if (!real) { err.textContent = 'Put your real URL'; result.style.display = 'block'; return; }
  try { new URL(real); } catch(e) { err.textContent = 'Bad URL. Needs https://'; result.style.display = 'block'; return; }

  info.textContent = 'Connecting to lnk.ua...';

  // Try POST to lnk.ua API with Bearer public
  fetch('https://lnk.ua/api/v1/link/create', {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer public',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ url: real })
  })
  .then(r => r.json())
  .then(data => {
    var short = data.shortUrl || data.short_url || data.link || (data.data && data.data.shortUrl) || '';
    if (short) {
      showResult(fake, short);
      info.textContent = 'Short URL: ' + short;
    } else {
      err.textContent = 'lnk.ua response: ' + JSON.stringify(data);
      showManual(fake);
    }
  })
  .catch(function(e) {
    info.textContent = 'Auto failed (' + e.message + '). Using manual method.';
    showManual(fake);
  });
}

function showResult(fake, short) {
  var preview = document.getElementById('preview');
  var output = document.getElementById('output');
  var result = document.getElementById('result');

  preview.href = short;
  preview.textContent = '🔗 ' + fake;
  preview.dataset.done = '1';

  var discord = '[' + fake + '](' + short + ')';
  var html = '<a href="' + short + '" target="_blank">' + fake + '</a>';

  preview.dataset.html = html;
  preview.dataset.discord = discord;
  output.textContent = discord;
  result.style.display = 'block';
}

function showManual(fake) {
  document.getElementById('manualBox').style.display = 'block';
  document.getElementById('result').style.display = 'block';
  document.getElementById('preview').textContent = '🔗 ' + fake + ' (waiting for short URL)';
  document.getElementById('output').textContent = '[Get short URL from lnk.ua first]';
  document.getElementById('err').textContent = '';
}

function manualDone() {
  var short = document.getElementById('manualShort').value.trim();
  var fake = document.getElementById('fake').value.trim();
  if (!fake) fake = 'https://www.roblox.com/';
  if (!short) { document.getElementById('err').textContent = 'Paste the short URL from lnk.ua'; return; }
  document.getElementById('err').textContent = '';
  showResult(fake, short);
  document.getElementById('info').textContent = '✅ Manual — short URL: ' + short;
  document.getElementById('manualBox').style.display = 'none';
}

function copy(mode) {
  var preview = document.getElementById('preview');
  var text = mode === 'html' ? preview.dataset.html : preview.dataset.discord;
  if (!text) return;

  document.getElementById('output').textContent = text;

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() {
      var btn = event.target;
      var orig = btn.textContent;
      btn.textContent = '✅ Copied!';
      setTimeout(function() { btn.textContent = orig; }, 2000);
    });
  } else {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;left:-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }
}
</script>
</body>
</html>
