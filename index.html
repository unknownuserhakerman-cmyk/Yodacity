<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link Masker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f23; color: #e0e0e0;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; padding: 20px;
    }
    .card {
      background: #1a1a2e; border-radius: 16px; padding: 40px;
      max-width: 600px; width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    h1 { font-size: 24px; margin-bottom: 8px; color: #fff; }
    .sub { color: #888; margin-bottom: 28px; font-size: 14px; }
    label { display: block; margin-bottom: 6px; font-size: 14px; color: #aaa; }
    input[type="text"], input[type="url"] {
      width: 100%; padding: 12px 16px; border-radius: 8px; border: 1px solid #333;
      background: #16213e; color: #fff; font-size: 15px; margin-bottom: 16px;
      outline: none; transition: border 0.2s;
    }
    input:focus { border-color: #4fc3f7; }
    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 8px;
      font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s;
    }
    .btn-primary { background: #4fc3f7; color: #0f0f23; }
    .btn-primary:hover { background: #29b6f6; }
    .btn-copy { background: #2e7d32; color: #fff; margin-top: 8px; }
    .btn-copy:hover { background: #388e3c; }
    #result { margin-top: 20px; display: none; }
    #result textarea {
      width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333;
      background: #16213e; color: #4fc3f7; font-size: 14px; min-height: 60px;
      resize: vertical; font-family: monospace;
    }
    .final-link {
      display: block; text-align: center; margin-top: 16px;
      padding: 16px; background: #0d2137; border-radius: 8px;
      border: 1px solid #4fc3f7; color: #4fc3f7; font-size: 18px;
      text-decoration: none; font-weight: 600; transition: 0.2s;
    }
    .final-link:hover { background: #4fc3f7; color: #0f0f23; }
    .error { color: #f44336; margin-top: 10px; font-size: 14px; }
  </style>
</head>
<body>
<div class="card">
  <h1>🔗 Hyperlink Generator</h1>
  <p class="sub">Shorten &amp; mask your links with a real redirect layer</p>

  <label>🎭 Display Text (what the victim sees)</label>
  <input type="text" id="displayText" value="https://www.roblox.com/" placeholder="https://legit-site.com">

  <label>🎯 Your Actual URL (where it redirects)</label>
  <input type="url" id="realUrl" placeholder="https://your-actual-page.com" value="https://example.com">

  <button class="btn btn-primary" onclick="generate()">🚀 Generate Hyperlink</button>

  <div id="result">
    <label>📋 Result (click the button below or copy this HTML):</label>
    <textarea id="output" readonly></textarea>
    <a id="previewLink" class="final-link" href="#" target="_blank">🔍 Preview Link</a>
    <button class="btn btn-copy" onclick="copyOutput()">📄 Copy to Clipboard</button>
    <div id="errorMsg" class="error"></div>
  </div>
</div>

<script>
async function generate() {
  const displayText = document.getElementById('displayText').value.trim();
  const realUrl = document.getElementById('realUrl').value.trim();
  const resultDiv = document.getElementById('result');
  const output = document.getElementById('output');
  const previewLink = document.getElementById('previewLink');
  const errorMsg = document.getElementById('errorMsg');

  resultDiv.style.display = 'none';
  errorMsg.textContent = '';

  if (!realUrl) {
    errorMsg.textContent = 'Please enter a real URL.';
    resultDiv.style.display = 'block';
    return;
  }

  // Validate URL
  try {
    new URL(realUrl);
  } catch {
    errorMsg.textContent = 'Invalid URL format. Include https://';
    resultDiv.style.display = 'block';
    return;
  }

  try {
    // Use TinyURL's official API directly
    const resp = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(realUrl)}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const shortUrl = await resp.text();

    if (!shortUrl || shortUrl.startsWith('Error')) {
      throw new Error('TinyURL returned an error. Try again.');
    }

    // Generate the hyperlinked button as requested
    const anchorHTML = `<a href="${shortUrl}" target="_blank">${displayText}</a>`;

    output.value = anchorHTML;
    previewLink.href = shortUrl;
    previewLink.textContent = `🔗 ${displayText}`;
    resultDiv.style.display = 'block';
  } catch (err) {
    errorMsg.textContent = `Shortener error: ${err.message}`;
    resultDiv.style.display = 'block';
  }
}

function copyOutput() {
  const output = document.getElementById('output');
  output.select();
  navigator.clipboard.writeText(output.value).then(() => {
    const btn = document.querySelector('.btn-copy');
    btn.textContent = '✅ Copied!';
    setTimeout(() => btn.textContent = '📄 Copy to Clipboard', 2000);
  });
}
</script>
</body>
</html>
